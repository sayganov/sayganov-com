<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Applies the persisted/system theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          if (theme === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {
          // localStorage/matchMedia unavailable; default light theme applies
        }
      })()
    </script>

    <!-- Google tag (gtag.js) -->
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('consent', 'default', { analytics_storage: 'denied' })
    </script>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"
    ></script>
    <script>
      gtag('js', new Date())
      gtag('config', '%VITE_GA_MEASUREMENT_ID%')
    </script>
